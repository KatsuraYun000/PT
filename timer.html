<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đồng Hồ Phục Hồi - Trợ Lý Cột Sống</title>
    <style>
        :root { 
            --blue-light: #eff6ff; --blue-primary: #2563eb; 
            --blue-dark: #1e3a8a; --green-primary: #10b981; 
            --orange-primary: #f59e0b; --orange-light: #fef3c7;
            --text-main: #334155; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text-main); background-color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; transition: background-color 0.5s ease;
            padding-bottom: 50px;
        }

        header { width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        .btn-back { text-decoration: none; color: var(--blue-dark); font-weight: bold; font-size: 16px; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background-color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .btn-back:hover { background-color: var(--blue-light); transform: translateX(-5px); }
        
        .header-tools { display: flex; gap: 10px; align-items: center; }
        .daily-streak { background-color: white; color: var(--orange-primary); font-weight: bold; padding: 10px 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--orange-light); display: flex; align-items: center; gap: 5px; font-size: 15px;}
        .btn-icon-tool { background-color: white; color: var(--blue-dark); border: none; font-weight: bold; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .btn-icon-tool:hover { background-color: #e2e8f0; }

        .config-container { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; justify-content: center; background-color: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s ease; }
        .config-item { display: flex; align-items: center; gap: 10px; }
        .config-item label { font-weight: bold; color: var(--blue-dark); font-size: 16px; }
        .config-item select, .config-item input { padding: 8px 15px; font-size: 16px; border-radius: 10px; border: 2px solid var(--blue-primary); color: var(--blue-dark); font-weight: bold; outline: none; cursor: pointer; background-color: white; }
        .config-item input { width: 90px; text-align: center; }
        .config-item input:focus { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }

        #addTimeContainer { display: none; border-left: 2px dashed #e2e8f0; padding-left: 20px; }
        #addTimeContainer input { width: 70px; border-color: var(--orange-primary); color: var(--orange-primary); }
        .btn-quick-add { background-color: var(--orange-primary); color: white; border: none; padding: 9px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; margin-left: -5px; }
        .btn-quick-add:hover { background-color: #d97706; transform: scale(1.05); }

        .timer-container { text-align: center; margin-top: 30px; }
        .session-title { font-size: 28px; color: var(--blue-dark); margin-bottom: 10px; font-weight: bold; transition: 0.5s; }
        .exercise-subtitle { font-size: 18px; color: var(--orange-primary); margin-bottom: 15px; font-weight: 600; height: 25px;}
        
        .progress-ring { position: relative; width: 300px; height: 300px; margin: 0 auto; }
        .progress-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .progress-ring circle { fill: transparent; stroke-width: 15; stroke-linecap: round; }
        .progress-ring .bg-circle { stroke: #e2e8f0; }
        .progress-ring .progress-circle { stroke: var(--blue-primary); stroke-dasharray: 880; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s ease; }
        .time-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 64px; font-weight: bold; color: var(--blue-dark); transition: 0.5s; }

        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-start { background-color: var(--blue-primary); color: white; min-width: 130px;}
        .btn-start:hover { background-color: #1d4ed8; transform: translateY(-2px); }
        .btn-view-detail { background-color: var(--orange-light); color: var(--orange-primary); border: 2px solid var(--orange-primary); display: none; }
        .btn-view-detail:hover { background-color: var(--orange-primary); color: white; }
        .btn-reset { background-color: white; color: #64748b; border: 1px solid #cbd5e1; }
        .btn-reset:hover { background-color: #f1f5f9; }

        .selection-panel { width: 90%; max-width: 600px; background-color: white; border-radius: 20px; padding: 30px; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border-top: 6px solid var(--orange-primary); display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .panel-header { text-align: center; margin-bottom: 20px; }
        .panel-header h3 { color: var(--orange-primary); font-size: 22px; margin-bottom: 5px; text-transform: uppercase;}
        .panel-header p { color: #64748b; font-size: 16px; font-weight: 600; }

        .exercise-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;}
        .exercise-option-btn { background-color: var(--orange-light); border: 2px solid transparent; border-left: 6px solid var(--orange-primary); border-radius: 12px; padding: 15px 20px; text-align: left; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .exercise-option-btn:hover { border-color: var(--orange-primary); transform: translateX(5px); }
        .opt-name { font-size: 16px; font-weight: bold; color: var(--text-main); flex: 1;}
        .opt-time { background-color: white; color: var(--orange-primary); padding: 5px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; white-space: nowrap; margin-left: 10px;}

        .btn-snooze { width: 100%; background-color: #f1f5f9; color: #475569; padding: 15px; font-size: 16px; border-radius: 12px; border: 1px dashed #cbd5e1; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .btn-snooze:hover { background-color: #e2e8f0; color: var(--blue-dark); border-style: solid;}

        .btn-back-to-work { background-color: var(--green-primary); color: white; margin-top: 20px; width: 100%; display: none; padding: 15px; font-size: 20px; border-radius: 12px;}
        .btn-back-to-work:hover { background-color: #059669; transform: scale(1.02); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; z-index: 2000; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background-color: white; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; border-radius: 15px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); transform: scale(0.9); transition: 0.3s ease; border-top: 6px solid var(--orange-primary);}
        .modal-overlay.active .modal-content { transform: scale(1); }
        .detail-title { color: var(--orange-primary); font-size: 24px; margin-bottom: 20px; text-align: center; line-height: 1.4;}
        .instruction-steps { list-style: none; margin-bottom: 30px; }
        .instruction-steps li { position: relative; padding-left: 25px; margin-bottom: 12px; font-size: 16px; line-height: 1.6; }
        .instruction-steps li::before { content: "✓"; position: absolute; left: 0; color: var(--orange-primary); font-weight: bold;}
        .btn-close { width: 100%; background-color: #e2e8f0; color: #475569; padding: 12px; font-size: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s;}
        .btn-close:hover { background-color: #cbd5e1; }

        body.exercise-mode { background-color: #fffbeb; }
        body.exercise-mode .session-title, body.exercise-mode .time-display { color: var(--orange-primary); }
        body.exercise-mode .progress-circle { stroke: var(--orange-primary); }
        body.exercise-mode .btn-start { background-color: var(--orange-primary); }
        body.exercise-mode .btn-start:hover { background-color: #d97706; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back"><span>&#8592;</span> Trang chủ</a>
        <div class="header-tools">
            <div class="daily-streak" id="dailyStreakCount">🔥 Hôm nay: 0 bài</div>
            <button class="btn-icon-tool" id="btnMute" onclick="toggleMute()" title="Bật/Tắt âm thanh">🔊</button>
        </div>
    </header>

    <div class="config-container">
        <div class="config-item">
            <label>Lộ trình:</label>
            <select id="weekSelect" onchange="saveWeek()">
                <option value="1">Tuần 1: Nhận thức & Làm quen</option>
                <option value="2">Tuần 2: Giảm cơn đau</option>
                <option value="3">Tuần 3: Tăng sức mạnh</option>
                <option value="4">Tuần 4: Duy trì</option>
            </select>
        </div>
        <div class="config-item">
            <label>Làm việc (phút):</label>
            <input type="number" id="workMinInput" min="1" max="180" value="90" onchange="updateWorkTime()">
        </div>
        
        <div class="config-item" id="addTimeContainer">
            <label style="color: var(--orange-primary);">Gia hạn:</label>
            <button class="btn-quick-add" onclick="addExerciseTime(10)">+10s</button>
            <input type="number" id="customAddSecInput" value="30" min="1" placeholder="Giây">
            <button class="btn-quick-add" onclick="addCustomExerciseTime()">+ Thêm</button>
        </div>
    </div>

    <div class="timer-container">
        <div class="session-title" id="sessionTitle">PHIÊN LÀM VIỆC</div>
        <div class="exercise-subtitle" id="exerciseSubtitle"></div>
        <div class="progress-ring">
            <svg>
                <circle class="bg-circle" cx="150" cy="150" r="140"></circle>
                <circle class="progress-circle" id="progressCircle" cx="150" cy="150" r="140"></circle>
            </svg>
            <div class="time-display" id="timeDisplay">90:00</div>
        </div>
        
        <div class="controls" id="mainControls">
            <button class="btn-start" id="startBtn" onclick="toggleTimer()">Bắt Đầu</button>
            <button class="btn-view-detail" id="btnViewDetail" onclick="openDetailModal()">📖 Xem hướng dẫn</button>
            <button class="btn-reset" onclick="resetTimer()">Làm mới</button>
        </div>
        
        <button class="btn-back-to-work" id="btnBackToWork" onclick="returnToWork()">Tuyệt vời! Quay lại Làm việc</button>
    </div>

    <div class="selection-panel" id="selectionPanel">
        <div class="panel-header">
            <h3>🔥 ĐẾN GIỜ VẬN ĐỘNG</h3>
            <p id="timeSlotContext">Chọn 1 bài tập bạn muốn thực hiện ngay lúc này:</p>
        </div>
        <div class="exercise-options" id="exerciseOptionsContainer"></div>
        <button class="btn-snooze" onclick="snoozeTimer()">💻 Đang bận họp - Nhắc lại sau 10 phút</button>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <h3 class="detail-title" id="detailTitle">Tên bài tập</h3>
            <ul class="instruction-steps" id="detailSteps"></ul>
            <button class="btn-close" onclick="closeDetailModal()">Đã hiểu - Đóng lại</button>
        </div>
    </div>

                        { name: "Đứng lên và di chuyển", duration: 180, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...)."] },
                        { name: "Xoay cổ", duration: 60, details: ["Xoay cổ 3-4 vòng."] }
                    ], 
                    "toi": [
                        { name: "Tập Lunge", duration: 180, details: ["Đứng thẳng, bước một chân lên trước. Hạ người xuống cho đến khi hai đầu gối tạo góc khoảng 90°. Đẩy người lên trở lại vị trí ban đầu. Đổi chân và lặp lại."] }
                    ] 
                } 
            },
            "4": { 
                "246": { 
                    "sang": [
                        { name: "Bài tập ấn cằm (Chin Tuck)", duration: 120, details: ["Đứng hoặc ngồi thẳng lưng tựa vào tường.", "Từ từ thu cằm vào trong sao cho phần sau cổ được kéo dài ra và chạm sát vào tường. Giữ 5s, lặp 10 lần."] },
                        { name: "Đứng lên và di chuyển", duration: 180, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...)."] },
                        { name: "Nâng cao đùi", duration: 120, details: ["Đứng lên nâng cao đùi (30 lần)."] }
                    ], 
                    "chieu": [
                        { name: "Đứng lên và di chuyển", duration: 180, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...)."] },
                        { name: "Gót chạm mông", duration: 120, details: ["Đứng lên gót chạm mông (30 lần)."] }
                    ], 
                    "toi": [
                        { name: "Plank cơ bản", duration: 120, details: ["Chống hai khuỷu tay và mũi chân xuống sàn, giữ người thành một đường thẳng (30-60s)."] },
                        { name: "Plank nghiêng", duration: 120, details: ["Nằm nghiêng, chống khuỷu tay xuống sàn ngay dưới vai. Nâng hông lên sao cho cơ thể thành một đường thẳng (30-60s mỗi bên)."] }
                    ] 
                }, 
                "357": { 
                    "sang": [
                        { name: "Bài tập Y-W", duration: 120, details: ["Nằm sấp hoặc đứng cúi người. Giơ hai tay tạo thành chữ Y, sau đó kéo khuỷu tay xuống sườn để tạo thành chữ W, ép chặt hai bả vai vào nhau."] },
                        { name: "Đứng lên và di chuyển", duration: 180, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...)."] },
                        { name: "Gót chạm mông", duration: 120, details: ["Đứng lên gót chạm mông (30 lần)."] }
                    ], 
                    "chieu": [
                        { name: "Đứng lên và di chuyển", duration: 180, details: ["Đứng lên và di chuyển (đứng - ngồi tại chỗ, đi uống nước, ăn nhẹ, vệ sinh,...)."] },
                        { name: "Bài tập ấn cằm (Chin Tuck)", duration: 60, details: ["Đứng hoặc ngồi tựa tường, thu cằm vào trong."] }
                    ], 
                    "toi": [
                        { name: "Dead bug", duration: 180, details: ["Nằm ngửa, giơ hai tay lên trời, co hai chân vuông góc. Từ từ hạ tay và chân đối diện xuống."] },
                        { name: "Bird Dog", duration: 180, details: ["Chống hai tay và hai đầu gối xuống sàn. Duỗi tay trái về phía trước và chân phải về phía sau."] }
                    ] 
                } 
            }
        };

        let WORK_TIME = 90 * 60; 
        let timeRemaining = WORK_TIME;
        let currentMode = 'WORK'; 
        let currentTotalTime = WORK_TIME; 
        let currentExerciseDuration = 0; 
        let currentExerciseList = [];
        let currentTaskObj = null;

        let timerInterval = null;
        let isRunning = false;
        let isMuted = false;
        let dailyCount = 0;

        const timeDisplay = document.getElementById('timeDisplay');
        const sessionTitle = document.getElementById('sessionTitle');
        const exerciseSubtitle = document.getElementById('exerciseSubtitle');
        const startBtn = document.getElementById('startBtn');
        const btnViewDetail = document.getElementById('btnViewDetail');
        const progressCircle = document.getElementById('progressCircle');
        const selectionPanel = document.getElementById('selectionPanel');
        const mainControls = document.getElementById('mainControls');
        const btnBackToWork = document.getElementById('btnBackToWork');
        const workMinInput = document.getElementById('workMinInput');
        const addTimeContainer = document.getElementById('addTimeContainer');
        const alarmSound = document.getElementById('alarmSound');
        const circleCircumference = 2 * Math.PI * 140;

        // =========================================
        // THỐNG KÊ NGÀY (STREAK) & MUTE ÂM THANH
        // =========================================
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('btnMute').innerText = isMuted ? "🔇" : "🔊";
            localStorage.setItem('pt_is_muted', isMuted);
        }

        function playSound() {
            if (!isMuted) alarmSound.play();
        }

        function updateDailyStreak() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('pt_streak_date');
            
            if (savedDate !== today) {
                dailyCount = 0; 
                localStorage.setItem('pt_streak_date', today);
            } else {
                dailyCount = parseInt(localStorage.getItem('pt_daily_count') || 0);
            }
            document.getElementById('dailyStreakCount').innerText = `🔥 Hôm nay: ${dailyCount} bài`;
        }

        function increaseStreak() {
            dailyCount++;
            localStorage.setItem('pt_daily_count', dailyCount);
            document.getElementById('dailyStreakCount').innerText = `🔥 Hôm nay: ${dailyCount} bài`;
        }

        // =========================================
        // TÍNH NĂNG "SNOOZE" (BẬN HỌP)
        // =========================================
        function snoozeTimer() {
            currentMode = 'WORK';
            currentTotalTime = WORK_TIME;
            timeRemaining = 10 * 60; 
            
            localStorage.setItem('pt_timer_time', timeRemaining);
            localStorage.setItem('pt_timer_mode', 'WORK');
            
            updateUI();
            toggleTimer(); 
        }

        // TÍNH NĂNG CỘNG THÊM GIỜ TẬP LUYỆN
        function addExerciseTime(seconds) {
            if (currentMode !== 'EXERCISE') return;
            timeRemaining += seconds;
            currentTotalTime += seconds;
            updateUI();
        }

        function addCustomExerciseTime() {
            if (currentMode !== 'EXERCISE') return;
            const sec = parseInt(document.getElementById('customAddSecInput').value);
            if (sec > 0) addExerciseTime(sec);
        }

        // =========================================
        // HÀM CHUYỂN ĐỔI GIAO DIỆN & TAB TITLE
        // =========================================
        function updateUI() {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            let timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            timeDisplay.innerText = timeString;
            
            let tabStatus = (currentMode === 'WORK') ? "Phiên làm việc" : (currentMode === 'SELECT') ? "Đến giờ tập!" : "Đang tập";
            document.title = `(${timeString}) ${tabStatus} - Trợ Lý Cột Sống`;

            let percentLeft = timeRemaining / currentTotalTime;
            let offset = circleCircumference - (percentLeft * circleCircumference);
            progressCircle.style.strokeDashoffset = offset;

            if (currentMode === 'WORK') {
                document.body.classList.remove('exercise-mode');
                sessionTitle.innerText = "PHIÊN LÀM VIỆC";
                exerciseSubtitle.innerText = "";
                selectionPanel.style.display = 'none';
                mainControls.style.display = 'flex';
                btnBackToWork.style.display = 'none';
                btnViewDetail.style.display = 'none';
                addTimeContainer.style.display = 'none'; 
            } 
            else if (currentMode === 'SELECT') {
                document.body.classList.add('exercise-mode');
                sessionTitle.innerText = "ĐẾN GIỜ VẬN ĐỘNG";
                exerciseSubtitle.innerText = "";
                timeDisplay.innerText = "00:00"; 
                progressCircle.style.strokeDashoffset = circleCircumference;
                selectionPanel.style.display = 'block';
                mainControls.style.display = 'none';
                btnBackToWork.style.display = 'none';
                btnViewDetail.style.display = 'none'; 
                addTimeContainer.style.display = 'none'; 
                loadExercisesForCurrentSlot();
            }
            else if (currentMode === 'EXERCISE') {
                document.body.classList.add('exercise-mode');
                sessionTitle.innerText = "ĐANG TẬP LUYỆN";
                selectionPanel.style.display = 'none';
                mainControls.style.display = 'flex';
                btnBackToWork.style.display = 'none';
                btnViewDetail.style.display = 'inline-block'; 
                addTimeContainer.style.display = 'flex'; 
            }
        }

        function loadExercisesForCurrentSlot() {
            const currentWeek = document.getElementById('weekSelect').value;
            const now = new Date();
            const dayOfWeek = now.getDay(); 
            const currentHour = now.getHours();

            let dayGroup = (dayOfWeek === 1 || dayOfWeek === 3 || dayOfWeek === 5) ? "246" : "357";
            let timeSlot = (currentHour < 12) ? "sang" : (currentHour < 18) ? "chieu" : "toi";

            currentExerciseList = exerciseDB[currentWeek][dayGroup][timeSlot];
            const container = document.getElementById('exerciseOptionsContainer');
            container.innerHTML = "";
            
            currentExerciseList.forEach((task, index) => {
                let div = document.createElement("div");
                div.className = "exercise-option-btn";
                div.innerHTML = `<span class="opt-name">${task.name}</span><span class="opt-time">${task.duration}s</span>`;
                div.onclick = () => selectExercise(index);
                container.appendChild(div);
            });
        }

        function selectExercise(index) {
            currentTaskObj = currentExerciseList[index];
            currentExerciseDuration = currentTaskObj.duration;
            currentTotalTime = currentExerciseDuration;
            timeRemaining = currentExerciseDuration;
            currentMode = 'EXERCISE';
            
            exerciseSubtitle.innerText = `Đang chọn: ${currentTaskObj.name}`;
            startBtn.innerText = "Bắt đầu tập";
            updateUI();
            openDetailModal(); 
        }

        function openDetailModal() {
            if(!currentTaskObj) return;
            document.getElementById('detailTitle').innerText = currentTaskObj.name;
            const ul = document.getElementById('detailSteps');
            ul.innerHTML = "";
            currentTaskObj.details.forEach(step => {
                let li = document.createElement("li");
                li.innerText = step;
                ul.appendChild(li);
            });
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); }

        // =========================================
        // LOGIC LƯU LỘ TRÌNH & CHẠY ĐỒNG HỒ
        // =========================================
        function updateWorkTime() {
            let newVal = parseInt(workMinInput.value);
            if (newVal > 0) {
                WORK_TIME = newVal * 60;
                localStorage.setItem('pt_custom_work', WORK_TIME);
                if (currentMode === 'WORK') { resetTimer(); }
            } else {
                alert("Vui lòng nhập số phút hợp lệ (>0)!");
                workMinInput.value = WORK_TIME / 60; 
            }
        }

        function saveWeek() { localStorage.setItem('pt_current_week', document.getElementById('weekSelect').value); }

        function loadFromLocalStorage() {
            const savedMute = localStorage.getItem('pt_is_muted');
            if (savedMute === 'true') { isMuted = true; document.getElementById('btnMute').innerText = "🔇"; }

            const customWork = localStorage.getItem('pt_custom_work');
            if (customWork) { WORK_TIME = parseInt(customWork); workMinInput.value = WORK_TIME / 60; }

            const savedMode = localStorage.getItem('pt_timer_mode');
            const savedTime = localStorage.getItem('pt_timer_time');
            
            if (savedMode === 'WORK' && savedTime !== null) { 
                currentMode = 'WORK'; currentTotalTime = WORK_TIME; timeRemaining = parseInt(savedTime); 
            } else { 
                currentMode = 'WORK'; currentTotalTime = WORK_TIME; timeRemaining = WORK_TIME; 
            }

            const savedWeek = localStorage.getItem('pt_current_week');
            if (savedWeek) { document.getElementById('weekSelect').value = savedWeek; }

            updateDailyStreak();
            updateUI();
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                startBtn.innerText = "Tiếp tục";
                isRunning = false;
            } else {
                startBtn.innerText = "Tạm dừng";
                isRunning = true;
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    
                    if(currentMode === 'WORK') {
                        localStorage.setItem('pt_timer_time', timeRemaining);
                        localStorage.setItem('pt_timer_mode', 'WORK');
                    }

                    updateUI();
                    
                    if (timeRemaining <= 0) { 
                        clearInterval(timerInterval);
                        isRunning = false;
                        playSound(); 

                        if (currentMode === 'WORK') {
                            currentMode = 'SELECT';
                            updateUI();
                        } else if (currentMode === 'EXERCISE') {
                            increaseStreak(); 
                            exerciseSubtitle.innerText = "Tuyệt vời! Bạn đã hoàn thành bài tập.";
                            mainControls.style.display = 'none';
                            btnBackToWork.style.display = 'block'; 
                            addTimeContainer.style.display = 'none';
                        }
                    }
                }, 1000);
            }
        }

        function returnToWork() {
            currentMode = 'WORK';
            currentTotalTime = WORK_TIME;
            timeRemaining = WORK_TIME;
            startBtn.innerText = "Bắt Đầu";
            localStorage.setItem('pt_timer_time', timeRemaining);
            localStorage.setItem('pt_timer_mode', 'WORK');
            updateUI();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.innerText = "Bắt Đầu";
            currentMode = 'WORK';
            currentTotalTime = WORK_TIME;
            timeRemaining = WORK_TIME;
            localStorage.setItem('pt_timer_time', timeRemaining);
            localStorage.setItem('pt_timer_mode', 'WORK');
            updateUI();
        }

        loadFromLocalStorage();
    </script>
</body>
